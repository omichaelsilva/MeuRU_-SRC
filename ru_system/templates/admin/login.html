{% extends "base.html" %}
{% block title %}Admin Login — MEU RU{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center p-4">
    <button onclick="toggleDarkMode()"
        class="dm-icon fixed top-4 right-4 text-white/40 hover:text-white/80 transition p-2 rounded-lg hover:bg-white/10">
    </button>
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-700 rounded-full shadow-lg mb-4 border-2 border-gray-500">
                <span class="text-4xl">🔐</span>
            </div>
            <h1 class="text-3xl font-bold text-white">RU Admin</h1>
            <p class="text-gray-400 mt-1">Painel Administrativo</p>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-2 text-center">Acesso Restrito</h2>
            <p class="text-gray-400 text-sm text-center mb-6">Use suas credenciais de administrador</p>

            {% if erro %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-red-700 text-sm">
                ⚠️ {{ erro }}
            </div>
            {% endif %}

            <form method="POST" action="/admin/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input
                        type="email"
                        name="email"
                        placeholder="admin@ru.edu.br"
                        required
                        autocomplete="username"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-600 focus:border-transparent outline-none transition"
                    >
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <div class="relative">
                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-600 outline-none transition pr-12"
                        >
                        <button type="button" onclick="toggleSenha('senha')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">👁️</button>
                    </div>
                </div>

                <button
                    type="submit"
                    class="w-full bg-gray-800 hover:bg-gray-900 text-white font-semibold py-3 px-6 rounded-lg transition flex items-center justify-center gap-2"
                    onclick="setLoading(this)"
                >
                    <span class="btn-text">Entrar</span>
                    <span class="btn-loading hidden">
                        <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Entrando...
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login" class="text-xs text-gray-400 hover:text-gray-600">← Área do aluno</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
